# Change prefix from Ctrl+b to Ctrl+s
unbind C-b
set -g prefix C-s
bind C-s send-prefix
# Change prefix from Ctrl+b to Ctrl+s
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Enable mouse support

# Change prefix to Ctrl+a

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Ctrl+arrow keys to switch panes (unbind default)
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Remove hjkl bindings
unbind h
unbind j
unbind k
unbind l

# GitHub Dark theme colors
set -g pane-border-style fg=#30363d
set -g pane-active-border-style fg=#58a6ff

# Dim inactive panes
set -g window-style fg=#8b949e,bg=#0d1117
set -g window-active-style fg=#c9d1d9,bg=#010409

# Status bar with GitHub Dark theme
set -g status-style bg=#161b22,fg=#c9d1d9
set -g status-left-style fg=#58a6ff
set -g status-right-style fg=#8b949e

# Pane number display at top
set -g pane-border-status top
set -g pane-border-format "#[fg=#58a6ff,bg=#161b22] #{pane_index} #[fg=#8b949e]#{pane_current_command} "

# Set prefix to Ctrl+s
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Set prefix to Ctrl+s
unbind C-b
set -g prefix C-s
bind C-s send-prefix
set -g mouse on
