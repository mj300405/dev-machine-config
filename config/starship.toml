# Starship configuration with single line and right-facing arrow tip

# Define a single-line format
format = "$username$directory$git_branch$git_status$package$golang$terraform$docker_context$python$nodejs$character"

# No extra newline
add_newline = false

[localip]
ssh_only = false
format = '[$localipv4](bold red) '
disabled = false

[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
disabled = true  # Hostname is disabled

# Right-facing arrow tip
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
  
# configure directory
[directory]
read_only = " "
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "  "

[conda]
symbol = " "

[dart]
symbol = " "

[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = " "

[elm]
symbol = " "

# Git branch with branch icon and "on" prefix
[git_branch]
symbol = " "
format = "on [${symbol}${branch}](bold purple) "
truncation_length = 20
truncation_symbol = "..."

# Git status with format like "[$!+?]"
[git_status]
format = '[\[$all_status$ahead_behind\]](bold red) '
conflicted = "✖"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↕↑${ahead_count}↓${behind_count}"
up_to_date = ""
untracked = "…"
stashed = "●"
modified = "✚"
staged = "●"
renamed = "»"
deleted = "✖"

[golang]
symbol = " "

[hg_branch]
symbol = " "

[java]
symbol = " "

[julia]
symbol = " "

[memory_usage]
symbol = "󰍛 "

[nim]
symbol = " "

[nix_shell]
symbol = " "

[package]
symbol = "󰏗 "

[perl]
symbol = " "

[php]
symbol = " "

[python]
symbol = " "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = " "

[rust]
symbol = " "

[scala]
symbol = " "

[shlvl]
symbol = " "

[swift]
symbol = "ﯣ "

[nodejs]
format = "via [ Node.js $version](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]   