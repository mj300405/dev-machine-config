# Powerline-style prompt tuned for a LazyVim/Ghostty workflow.
# Requires a Nerd Font in the terminal.

format = """
[¯éÂ](fg:#89b4fa)\
$os\
$username\
[¯é░](bg:#313244 fg:#89b4fa)\
$directory\
[¯é░](fg:#313244 bg:#45475a)\
$git_branch\
$git_status\
[¯é░](fg:#45475a bg:#585b70)\
$nodejs\
$python\
$docker_context\
$package\
[¯é░](fg:#585b70)\
$fill\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
blue = "#89b4fa"
lavender = "#b4befe"
sapphire = "#74c7ec"
green = "#a6e3a1"
yellow = "#f9e2af"
peach = "#fab387"
red = "#f38ba8"
mauve = "#cba6f7"
surface0 = "#313244"
surface1 = "#45475a"
surface2 = "#585b70"
text = "#cdd6f4"

[fill]
symbol = " "

[os]
disabled = false
style = "bg:blue fg:#11111b"
format = "[ $symbol ]($style)"

[os.symbols]
Macos = "´îé"

[username]
show_always = true
style_user = "bg:blue fg:#11111b bold"
style_root = "bg:red fg:#11111b bold"
format = "[$user ]($style)"

[directory]
style = "bg:surface0 fg:text bold"
format = "[ ´ü╝ $path ]($style)"
truncation_length = 3
truncate_to_repo = true
read_only = " ¾░î¥"

[git_branch]
symbol = "´Éÿ"
style = "bg:surface1 fg:mauve bold"
format = "[ $symbol $branch ]($style)"
truncation_length = 24
truncation_symbol = "ÔÇª"

[git_status]
style = "bg:surface1 fg:peach bold"
format = "[$all_status$ahead_behind ]($style)"
conflicted = "¯£º "
ahead = "Ôçí${count} "
behind = "Ôçú${count} "
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count} "
untracked = "?${count} "
stashed = "¾░Åù "
modified = "!${count} "
staged = "+${count} "
renamed = "┬╗${count} "
deleted = "Ô£ÿ${count} "

[nodejs]
symbol = "¯£ÿ"
style = "bg:surface2 fg:green bold"
format = "[ $symbol $version ]($style)"
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
symbol = "¯£╝"
style = "bg:surface2 fg:yellow bold"
format = "[ $symbol $version${virtualenv} ]($style)"
python_binary = ["./venv/bin/python", ".venv/bin/python", "python3", "python"]
detect_extensions = ["py"]
version_format = "v${raw}"

[docker_context]
symbol = "´îê"
style = "bg:surface2 fg:sapphire bold"
format = "[ $symbol $context ]($style)"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

[package]
symbol = "¾░Åù"
style = "bg:surface2 fg:lavender bold"
format = "[ $symbol $version ]($style)"

[cmd_duration]
min_time = 1000
style = "fg:yellow bold"
format = "[¾░öø $duration]($style) "

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold mauve)"
